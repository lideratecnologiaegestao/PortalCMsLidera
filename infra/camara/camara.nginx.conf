# Portal da Câmara — SaaS multi-câmaras — CURINGA *.camara.lidera.app.br
# Atrás do Cloudflare Zero Trust (TLS público na borda CF; aqui é HTTP).
#   /api/*  -> camara-api (NestJS) em 127.0.0.1:3011
#   /midia/ -> camara-api (mídia pública mascarada)
#   /       -> camara-web (Next.js) em 127.0.0.1:3010
#
# Um único vhost atende TODAS as câmaras: backend/web resolvem o tenant pelo
# Host (DB + cache Redis). Nova câmara = nova linha em `tenants` (subdomínio) →
# já no ar, sem mexer no Nginx.
#
# PRECEDÊNCIA: `*.camara.lidera.app.br` é mais específico que o `*.lidera.app.br`
# da prefeitura, então o Nginx roteia os subdomínios de câmara para CÁ. Para
# apontar um domínio oficial .leg.br de uma câmara (ex.: serranovadourada.mt.leg.br),
# liste-o no server_name ABAIXO (e remova-o do prefeitura.conf, que hoje captura
# `*.mt.leg.br`). Ver docs/deploy-camara.md.
#
# Instalar: copiar para C:\nginx\conf\sites\camara.conf, `nginx -t`, `nginx -s reload`.

server {
    listen 80;
    server_name *.camara.lidera.app.br;
    # Para domínios oficiais de câmaras, acrescente-os aqui, ex.:
    # server_name *.camara.lidera.app.br serranovadourada.mt.leg.br;

    access_log logs/camara-access.log combined_real;
    error_log  logs/camara-error.log;

    # uploads multipart (anexos de ESIC/ouvidoria, documentos, certificados) via API
    client_max_body_size 100m;

    location ~ /\.(env|git|svn|ht) { deny all; return 404; }

    # ---- API (NestJS, global prefix /api) — inclui WebSocket do chat interno ----
    location /api/ {
        proxy_pass http://127.0.0.1:3011;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- Mídia pública mascarada (servida pelo backend, fora do /api) ----
    location /midia/ {
        proxy_pass http://127.0.0.1:3011;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ---- Portal público + painel admin (Next.js SSR/ISR) ----
    location / {
        proxy_pass http://127.0.0.1:3010;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
