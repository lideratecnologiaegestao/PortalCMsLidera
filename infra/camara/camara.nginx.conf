# =====================================================================
# Portal da Câmara — roteamento Nginx (atrás do Cloudflare ZT; aqui HTTP)
# =====================================================================
# Câmaras e prefeitura compartilham o espaço *.lidera.app.br. O Nginx decide
# o destino pelo Host: estes `server_name` são EXATOS e vencem o curinga
# `*.lidera.app.br` da prefeitura. Só os hosts listados aqui vão para a câmara;
# todo o resto cai na prefeitura. **Não** mexe no prefeitura.conf.
#
#   camara.lidera.app.br   -> PAINEL GERAL. O middleware do Next reescreve "/"
#                             para "/plataforma" (URL fica limpa, sem redirect).
#                             Exige NEXT_PUBLIC_PLATFORM_HOST=camara.lidera.app.br
#                             no BUILD do web e PLATFORM_HOST=... na API.
#   <slug>.lidera.app.br   -> câmara individual (tenant pelo subdomínio).
#   *.lidera.app.br (resto)-> prefeitura.
#
# ➕ NOVA CÂMARA = acrescentar o host no `server_name` + Restart-Service nginx
#    + criar a linha em `tenants` (subdomínio = slug). Nada mais.
#
# Instalar: copiar este arquivo e camara_locations.inc para C:\nginx\conf\sites\,
#           `nginx -t`, depois `Restart-Service nginx` (serviço LocalSystem).
# =====================================================================

server {
    listen 80;
    # 1º host = painel geral; demais = câmaras individuais. Acrescente novas aqui.
    server_name camara.lidera.app.br camarademo.lidera.app.br cmserranova.lidera.app.br;

    access_log logs/camara-access.log combined_real;
    error_log  logs/camara-error.log;
    client_max_body_size 100m;

    include sites/camara_locations.inc;
}
