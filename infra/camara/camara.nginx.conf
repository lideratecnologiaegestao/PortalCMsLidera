# =====================================================================
# Portal da Câmara — roteamento Nginx (atrás do Cloudflare ZT; aqui HTTP)
# =====================================================================
# As câmaras vivem no MESMO espaço de domínio da prefeitura (*.lidera.app.br).
# O Nginx decide o destino pelo Host:
#
#   camara.lidera.app.br            -> PAINEL GERAL (plataforma/super_admin)
#                                      "/" redireciona para "/plataforma".
#   <slug>.lidera.app.br (câmaras)  -> stack da CÂMARA (tenant pelo subdomínio)
#   *.lidera.app.br (resto)         -> stack da PREFEITURA (prefeitura.conf)
#
# COMO O NGINX SABE: estes server_name são EXATOS, e match exato vence o
# curinga `*.lidera.app.br` da prefeitura. Logo, só os hosts listados aqui vão
# para a câmara; todo o resto cai na prefeitura. **Não** mexe no prefeitura.conf.
#
# ➕ NOVA CÂMARA = acrescentar o host no `server_name` do 2º bloco + reload
#    (e criar a linha em `tenants` com o subdomínio). Nada mais.
#
# Instalar: copiar este arquivo e camara_locations.inc para C:\nginx\conf\sites\,
#           depois `nginx -t` e `nginx -s reload` (ou Restart-Service nginx).
# =====================================================================

# ── Painel geral da plataforma (super_admin gerencia todas as câmaras) ──────
server {
    listen 80;
    server_name camara.lidera.app.br;

    access_log logs/camara-access.log combined_real;
    error_log  logs/camara-error.log;
    client_max_body_size 100m;

    # Entrar direto na plataforma. Redirect relativo (absolute_redirect off) para
    # o navegador preservar o https da borda Cloudflare (Nginx aqui é HTTP).
    absolute_redirect off;
    location = / { return 302 /plataforma; }

    include sites/camara_locations.inc;
}

# ── Câmaras individuais (tenant resolvido pelo subdomínio) ──────────────────
# Acrescente novos hosts de câmara aqui (separados por espaço):
server {
    listen 80;
    server_name camarademo.lidera.app.br cmserranova.lidera.app.br;

    access_log logs/camara-access.log combined_real;
    error_log  logs/camara-error.log;
    client_max_body_size 100m;

    include sites/camara_locations.inc;
}
